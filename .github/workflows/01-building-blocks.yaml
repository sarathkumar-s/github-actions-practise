name: "01 - Building Blocks"
on: workflow_dispatch
jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Hello, World!"

  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Who am I?
        run: |
          echo "I will say who i'm"
          whoami
      - name: Say goodbye
        run: |
          echo "Goodbye!"
          