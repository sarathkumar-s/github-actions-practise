name: 04 - Using Actions

on: workflow_dispatch

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
    - name: Printing Folders
      run: ls -lrth
    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        node-version: '24.x'      
    - run: cd 04-using-actions
    - run: npm ci